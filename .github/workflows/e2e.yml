name: E2E Tests

on:
  pull_request:
    branches: [main]

# Require CI to pass first
jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Only run after all CI jobs pass
    needs: []  # GitHub Actions doesn't support cross-workflow needs directly;
               # use branch protection to require ci workflow to pass first.

    env:
      TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      APP_BASE_URL: ${{ secrets.TEST_BASE_URL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      TEST_USER_A_EMAIL: ${{ secrets.TEST_USER_A_EMAIL }}
      TEST_USER_B_EMAIL: ${{ secrets.TEST_USER_B_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to test database
        run: supabase db push --db-url "$TEST_DATABASE_URL"

      - name: Seed test database
        run: psql "$TEST_DATABASE_URL" -f supabase/seed.test.sql

      - name: Set test user passwords
        run: node scripts/ci-setup-test-env.mjs
        env:
          SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run E2E tests
        run: npm run test:e2e
