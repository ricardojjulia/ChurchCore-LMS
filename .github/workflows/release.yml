name: Release

on:
  push:
    branches: [main]

jobs:
  ci:
    name: Run CI Suite
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: ci
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to staging
        run: |
          supabase db push \
            --project-ref ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions to staging
        run: |
          supabase functions deploy search-users weekly-digest \
            --project-ref ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  approve:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: production   # Requires manual approval in GitHub → Settings → Environments
    steps:
      - name: Approved for production
        run: echo "Manual approval granted — proceeding to deploy"

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approve
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy search-users weekly-digest \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Vercel picks up the push to main automatically via its GitHub integration.
      # This step exists only to confirm the deploy succeeded and notify.
      - name: Wait for Vercel deploy
        run: |
          echo "Vercel production deploy triggered by push to main."
          echo "Monitor at: https://vercel.com/dashboard"

      - name: Notify on success
        if: success()
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -n "$DEPLOY_WEBHOOK_URL" ]; then
            curl -s -X POST "$DEPLOY_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\": \"✅ ChurchCore LMS deployed to production — commit ${{ github.sha }} by ${{ github.actor }}\"}"
          else
            echo "DEPLOY_WEBHOOK_URL not set — skipping notification"
          fi
